{% extends "base.html" %}

{% block title %}Error {{ error_code }} - PictureMania{% endblock %}

{% block content %}
<div class="max-w-md w-full flex flex-col gap-4 relative z-10">
    <div class="border-gradient-wrapper">
        <div class="border-gradient-card p-8 flex flex-col items-center text-center gap-6">
            <div class="w-16 h-16 rounded-full bg-rose-500/10 border border-rose-500/20 flex items-center justify-center text-rose-500 text-3xl">
                <i class="fa-solid fa-circle-exclamation"></i>
            </div>
            
            <div>
                <h1 class="font-outfit text-3xl font-bold tracking-wide text-white mb-2">Error {{ error_code }}</h1>
                <p class="text-sm text-[#94A3B8] leading-relaxed">{{ message }}</p>
            </div>

            <a href="/" class="btn-cta text-white px-6 py-2.5 rounded-xl text-xs sm:text-sm font-bold tracking-wide transition-all shadow-lg shadow-blue-500/20 mt-2">
                Return Home
            </a>
        </div>
    </div>
</div>
{% endblock %}
