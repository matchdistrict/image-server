<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>{% block title %}Secret Society Vault - Secure Telegram-Backed Storage{% endblock %}</title>
    <!-- Favicon Links -->
    <link class="fav" rel="icon" href="{{ logo_url }}" type="image/x-icon">
    <link class="fav" rel="shortcut icon" href="{{ logo_url }}" type="image/x-icon">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Inter:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        outfit: ['Outfit', 'sans-serif'],
                        inter: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <!-- Telegram WebApp SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Glassmorphic Premium Stylesheet -->
    <link rel="stylesheet" href="/static/css/main.css">
    <style>
        /* Block touch zoom actions on key UI components to keep it webapp native */
        body {
            touch-action: manipulation;
            overflow-x: hidden;
            width: 100%;
        }
        button, a, .img-cell, .tab-btn {
            touch-action: manipulation;
        }
    </style>
    <script>
        const IS_LOGGED_IN = "{{ username or '' }}" !== "";
    </script>
    {% block head %}{% endblock %}
</head>

<body
    class="bg-[#05060b] text-[#E2E8F0] min-h-screen flex flex-col font-inter selection:bg-blue-500/30 selection:text-white overflow-x-hidden w-full {% if username %}logged-in{% endif %}">
    <!-- Premium Navigation -->
    <nav
        class="glass-nav border-b border-white/5 py-3.5 px-3 sm:px-6 md:px-12 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-2">
            <img src="{{ logo_url }}" alt="Secret Society Vault Logo" class="w-8 h-8 sm:w-9 sm:h-9 rounded-xl object-cover shadow-lg shadow-blue-500/10 shrink-0">
            <a href="/"
                class="font-outfit text-base sm:text-lg md:text-xl font-bold tracking-wide bg-gradient-to-r from-white via-[#CBD5E1] to-[#64748B] bg-clip-text text-transparent truncate max-w-[110px] sm:max-w-none">
                Secret Society Vault
            </a>
        </div>
        <div class="flex items-center">
            {% if username %}
            <button onclick="typeof openTelePanel==='function' ? openTelePanel() : window.location.href='/'"
                class="text-[#94A3B8] hover:text-white transition-all flex items-center justify-center p-2 rounded-xl text-lg sm:text-xl"
                title="Account Telemetry">
                <i class="fa-regular fa-circle-user text-xl sm:text-2xl"></i>
            </button>
            {% endif %}
        </div>
    </nav>

    <!-- Main Content Panel -->
    <main class="flex-grow flex flex-col relative {% if not username %}items-center justify-center p-3.5 sm:p-6 md:p-12 overflow-hidden{% endif %}">
        <!-- Glow Orbs in background -->
        <div class="glow-orb top-[-10%] left-[-10%] bg-blue-600/10"></div>
        <div class="glow-orb bottom-[-10%] right-[-10%] bg-purple-600/10"></div>

        {% block content %}{% endblock %}
    </main>


    <script>
        // Automatic Telegram WebApp authentication
        if (window.Telegram && window.Telegram.WebApp) {
            const webapp = window.Telegram.WebApp;
            webapp.ready();
            webapp.expand();
            
            if (webapp.initData) {
                fetch('/api/auth/webapp', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ init_data: webapp.initData })
                })
                .then(res => {
                    if (!res.ok) throw new Error("Auth request failed");
                    return res.json();
                })
                .then(data => {
                    if (data.success && data.reload) {
                        window.location.reload();
                    }
                })
                .catch(err => console.error("Error authenticating WebApp session:", err));
            }
        }

        // WebApp session logout helper
        function handleLogout() {
            fetch('/api/auth/logout', { method: 'POST' })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    sessionStorage.clear();
                    window.location.href = '/';
                }
            })
            .catch(err => console.error("Logout request failed:", err));
        }
    </script>
    {% block scripts %}{% endblock %}
</body>

</html>
