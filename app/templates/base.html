<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}TGCloud - Premium Telegram-Backed Image Hosting{% endblock %}</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        outfit: ['Outfit', 'sans-serif'],
                        inter: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <!-- Glassmorphic Premium Stylesheet -->
    <link rel="stylesheet" href="/static/css/main.css">
    {% block head %}{% endblock %}
</head>
<body class="bg-[#05060b] text-[#E2E8F0] min-h-screen flex flex-col font-inter selection:bg-blue-500/30 selection:text-white">
    <!-- Premium Navigation -->
    <nav class="glass-nav border-b border-white/5 py-4 px-4 sm:px-6 md:px-12 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-2 sm:gap-3">
            <div class="w-9 h-9 sm:w-10 sm:h-10 rounded-xl bg-gradient-to-tr from-blue-500 to-purple-600 flex items-center justify-center shadow-lg shadow-blue-500/20">
                <i class="fa-solid fa-cloud-arrow-up text-white text-base sm:text-lg"></i>
            </div>
            <a href="/" class="font-outfit text-lg sm:text-xl font-bold tracking-wide bg-gradient-to-r from-white via-[#CBD5E1] to-[#64748B] bg-clip-text text-transparent">
                TGCloud<span class="text-blue-500">.host</span>
            </a>
        </div>
        <div class="flex items-center gap-2 sm:gap-4">
            <a href="/stats" class="text-sm font-medium text-[#94A3B8] hover:text-white hover:glow-text transition-all flex items-center justify-center gap-1.5 p-2 rounded-xl" title="Stats">
                <i class="fa-solid fa-chart-simple text-sm"></i><span class="hidden sm:inline">Stats</span>
            </a>
            <a href="/admin" class="text-sm font-medium text-[#94A3B8] hover:text-white hover:glow-text transition-all flex items-center justify-center gap-1.5 p-2 rounded-xl" title="Admin">
                <i class="fa-solid fa-shield-halved text-sm"></i><span class="hidden sm:inline">Admin</span>
            </a>
            <a href="https://t.me/your_bot" target="_blank" class="bg-blue-600/90 hover:bg-blue-500 hover:scale-[1.02] text-white p-2.5 sm:px-4 sm:py-2 rounded-xl text-xs sm:text-sm font-semibold tracking-wide transition-all shadow-lg shadow-blue-600/20 flex items-center justify-center gap-1.5" title="Upload Bot">
                <i class="fa-brands fa-telegram text-base"></i><span class="hidden sm:inline">Upload Bot</span>
            </a>
        </div>
    </nav>

    <!-- Main Content Panel -->
    <main class="flex-grow flex flex-col items-center justify-center p-4 sm:p-6 md:p-12 relative overflow-hidden">
        <!-- Glow Orbs in background -->
        <div class="glow-orb top-[-10%] left-[-10%] bg-blue-600/10"></div>
        <div class="glow-orb bottom-[-10%] right-[-10%] bg-purple-600/10"></div>
        
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="border-t border-white/5 py-6 px-4 text-center text-xs text-[#475569] font-medium max-w-4xl mx-auto w-full">
        <p>&copy; 2026 TGCloud.host. All images stored securely on Telegram channel database. Crafted with glassmorphism design.</p>
    </footer>

    {% block scripts %}{% endblock %}
</body>
</html>
